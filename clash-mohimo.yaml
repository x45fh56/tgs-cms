port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
proxies: []
proxy-groups:
- name: 🚀 انتخاب
  type: select
  proxies:
  - ♻️ خودکار
  - 🔘 دستی
- name: ♻️ خودکار
  type: url-test
  proxies: []
  url: http://www.gstatic.com/generate_204
  interval: 300
- name: 🔘 دستی
  type: select
  proxies: []
rules:
- DOMAIN-SUFFIX,ir,DIRECT
- GEOIP,IR,DIRECT
- MATCH,🚀 انتخاب
